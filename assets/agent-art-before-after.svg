<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Antes y ahora del flujo de trabajo</title>
  <desc id="desc">Antes conversación desordenada, ahora carpeta de objetivo retomable.</desc>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="13"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M1 1 L13 7 L1 13" fill="none" stroke="#e06324" stroke-width="3" stroke-linecap="round"/></marker>
    <style>
      .line{fill:none;stroke:#171717;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .thin{fill:none;stroke:#171717;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .orange{fill:none;stroke:#e06324;stroke-width:5;stroke-linecap:round;marker-end:url(#arrow);filter:url(#rough)}
      .blue{fill:none;stroke:#2767c7;stroke-width:4;stroke-dasharray:12 12;stroke-linecap:round;filter:url(#rough)}
      .label{font:700 38px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .small{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .red{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#bf3129}
      .blueText{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#2767c7}
      .orangeText{font:700 30px 'Segoe Print','Comic Sans MS',cursive;fill:#e06324}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fff"/>

  <text class="label" x="160" y="110">antes</text>
  <text class="label" x="1070" y="110">ahora</text>

  <g transform="translate(120 180)">
    <path class="line" d="M90 60 C170 10 330 10 420 75 C510 140 500 300 390 355 C280 410 80 370 25 260 C-25 160 25 95 90 60Z"/>
    <path class="thin" d="M115 100 l120 -20 l15 80 l-125 20Z"/>
    <path class="thin" d="M260 70 l120 30 l-25 80 l-115 -22Z"/>
    <path class="thin" d="M150 220 l160 -18 l18 95 l-158 22Z"/>
    <path class="thin" d="M315 230 l100 45 l-40 80 l-105 -45Z"/>
    <text class="small" x="130" y="143">chat</text>
    <text class="small" x="285" y="128">duda</text>
    <text class="small" x="176" y="275">logs</text>
    <text class="small" x="306" y="302">plan?</text>
    <path d="M250 360 C205 355 180 405 195 460 C208 510 290 512 318 462 C345 414 310 365 250 360Z" fill="#111"/>
    <circle cx="245" cy="415" r="10" fill="#fff"/><circle cx="286" cy="415" r="10" fill="#fff"/>
    <text class="red" x="15" y="545">todo vive en el hilo</text>
  </g>

  <path class="orange" d="M690 440 C790 385 875 385 970 440"/>
  <text class="orangeText" x="720" y="360">ordenarlo</text>

  <g transform="translate(980 180)">
    <rect class="line" x="30" y="30" width="420" height="470" rx="34"/>
    <path class="thin" d="M30 110 h420"/>
    <text class="small" x="64" y="88">carpeta</text>
    <rect class="thin" x="78" y="150" width="280" height="55" rx="10"/>
    <rect class="thin" x="78" y="230" width="320" height="55" rx="10"/>
    <rect class="thin" x="78" y="310" width="250" height="55" rx="10"/>
    <rect class="thin" x="78" y="390" width="300" height="55" rx="10"/>
    <text class="small" x="103" y="188">objetivo</text>
    <text class="small" x="103" y="268">estado</text>
    <text class="small" x="103" y="348">traspasos</text>
    <text class="small" x="103" y="428">pendientes</text>
    <path d="M485 320 C450 315 430 360 445 405 C460 450 525 448 540 405 C555 360 535 322 485 320Z" fill="#111"/>
    <circle cx="480" cy="372" r="8" fill="#fff"/><circle cx="510" cy="372" r="8" fill="#fff"/>
    <path class="thin" d="M445 390 C415 385 405 360 395 335"/>
    <path class="blue" d="M520 500 C430 610 165 610 65 520"/>
    <text class="blueText" x="115" y="595">retomable sin adivinar</text>
  </g>
</svg>
