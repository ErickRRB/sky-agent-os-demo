<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Selector de formato visual</title>
  <desc id="desc">El explicador visual de Sky ofrece mapa, pagina, tablero, slides, reporte o visuales renderizados.</desc>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="144"/><feDisplacementMap in="SourceGraphic" scale="2"/></filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto"><path d="M1 1 L13 7 L1 13" fill="none" stroke="#e06324" stroke-width="3" stroke-linecap="round"/></marker>
    <style>
      .line{fill:none;stroke:#171717;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .thin{fill:none;stroke:#171717;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .orange{fill:none;stroke:#e06324;stroke-width:4;stroke-linecap:round;marker-end:url(#arrow);filter:url(#rough)}
      .blue{fill:none;stroke:#2767c7;stroke-width:4;stroke-dasharray:12 12;stroke-linecap:round;filter:url(#rough)}
      .label{font:700 32px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .small{font:700 24px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .red{font:700 26px 'Segoe Print','Comic Sans MS',cursive;fill:#bf3129}
      .blueText{font:700 26px 'Segoe Print','Comic Sans MS',cursive;fill:#2767c7}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fff"/>

  <g transform="translate(660 275)">
    <path d="M105 120 C55 115 25 180 50 240 C72 295 160 295 190 240 C218 180 178 125 105 120Z" fill="#111"/>
    <circle cx="100" cy="185" r="10" fill="#fff"/><circle cx="140" cy="185" r="10" fill="#fff"/>
    <path class="thin" d="M185 210 C250 215 305 200 350 165"/>
    <rect class="line" x="315" y="90" width="220" height="150" rx="22"/>
    <text class="small" x="345" y="165">pregunta</text>
    <text class="label" x="40" y="385">elige formato</text>
  </g>

  <g transform="translate(95 115)">
    <rect class="line" x="0" y="0" width="275" height="120" rx="20"/><text class="small" x="84" y="72">mapa</text>
    <rect class="line" x="0" y="170" width="275" height="120" rx="20"/><text class="small" x="78" y="242">pagina</text>
    <rect class="line" x="0" y="340" width="275" height="120" rx="20"/><text class="small" x="58" y="414">dashboard</text>
  </g>
  <g transform="translate(1230 120)">
    <rect class="line" x="0" y="0" width="275" height="120" rx="20"/><text class="small" x="66" y="72">slides</text>
    <rect class="line" x="0" y="170" width="275" height="120" rx="20"/><text class="small" x="72" y="242">reporte</text>
    <rect class="line" x="0" y="340" width="275" height="120" rx="20"/><text class="small" x="55" y="414">ilustrado</text>
  </g>

  <path class="orange" d="M375 175 C500 170 575 210 650 290"/>
  <path class="orange" d="M375 345 C515 330 580 345 650 360"/>
  <path class="orange" d="M375 515 C515 540 590 510 680 445"/>
  <path class="orange" d="M1025 290 C1110 215 1180 180 1230 170"/>
  <path class="orange" d="M1035 370 C1110 345 1180 345 1230 345"/>
  <path class="orange" d="M1000 450 C1100 520 1170 530 1230 520"/>
  <path class="blue" d="M1135 675 C880 805 530 795 300 645"/>
  <text class="blueText" x="505" y="815">español por defecto</text>
  <text class="red" x="1080" y="640">sin chino visible</text>
</svg>
