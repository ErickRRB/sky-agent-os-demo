<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de intake del Sky Agent OS</title>
  <desc id="desc">Entrada cruda, intake, carpeta de objetivo, estado y memoria con estilo ilustrado renderizado.</desc>
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="2"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M 1 1 L 13 7 L 1 13" fill="none" stroke="#e06324" stroke-width="3" stroke-linecap="round"/>
    </marker>
    <style>
      .line{fill:none;stroke:#171717;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .thin{fill:none;stroke:#171717;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;filter:url(#rough)}
      .orange{fill:none;stroke:#e06324;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;marker-end:url(#arrow);filter:url(#rough)}
      .blue{fill:none;stroke:#2767c7;stroke-width:4;stroke-dasharray:14 14;stroke-linecap:round;filter:url(#rough)}
      .red{fill:none;stroke:#bf3129;stroke-width:4;stroke-linecap:round;filter:url(#rough)}
      .label{font:700 34px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .small{font:700 27px 'Segoe Print','Comic Sans MS',cursive;fill:#171717}
      .note-red{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#bf3129}
      .note-blue{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#2767c7}
      .note-orange{font:700 28px 'Segoe Print','Comic Sans MS',cursive;fill:#e06324}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#fff"/>

  <g transform="translate(95 210)">
    <path class="line" d="M0 250 C40 200 80 220 125 185 C160 160 210 160 250 195 C305 245 265 330 205 355 C135 382 40 348 0 250Z"/>
    <path class="thin" d="M40 95 l170 35 l-10 90 l-180 -30Z"/>
    <path class="thin" d="M95 0 l190 28 l-22 85 l-175 -25Z"/>
    <path class="thin" d="M145 150 l170 30 l-20 92 l-165 -32Z"/>
    <text class="small" x="64" y="174">error</text>
    <text class="small" x="120" y="63">ticket</text>
    <text class="small" x="177" y="224">logs</text>
    <text class="note-red" x="20" y="430">entrada cruda</text>
  </g>

  <path class="orange" d="M400 445 C500 405 560 405 655 430"/>

  <g transform="translate(650 180)">
    <rect class="line" x="0" y="95" width="420" height="370" rx="58"/>
    <circle class="thin" cx="90" cy="160" r="20"/>
    <circle class="thin" cx="150" cy="160" r="20"/>
    <circle class="thin" cx="210" cy="160" r="20"/>
    <path class="thin" d="M45 250 C110 220 270 220 350 250"/>
    <path d="M185 270 C140 265 120 325 142 380 C158 421 238 422 260 383 C286 334 245 274 185 270Z" fill="#111"/>
    <circle cx="180" cy="326" r="10" fill="#fff"/>
    <circle cx="225" cy="326" r="10" fill="#fff"/>
    <path class="thin" d="M250 345 C290 330 303 285 330 250"/>
    <path class="red" d="M330 250 l58 -42"/>
    <text class="note-red" x="330" y="200">decidir</text>
    <text class="label" x="116" y="525">intake</text>
  </g>

  <path class="orange" d="M1080 445 C1160 420 1225 405 1300 395"/>

  <g transform="translate(1230 210)">
    <path class="line" d="M0 0 l310 40 l-18 95 l-310 -38Z"/>
    <path class="line" d="M25 120 l305 35 l-15 92 l-305 -35Z"/>
    <path class="line" d="M2 238 l310 42 l-16 92 l-310 -40Z"/>
    <path class="line" d="M35 358 l305 35 l-12 92 l-310 -32Z"/>
    <text class="small" x="58" y="67">objetivo</text>
    <text class="small" x="72" y="185">estado</text>
    <text class="small" x="52" y="305">traspasos</text>
    <text class="small" x="72" y="425">evidencia</text>
  </g>

  <path class="blue" d="M1250 700 C940 780 515 745 245 615"/>
  <text class="note-blue" x="690" y="802">memoria y mejora</text>
  <path class="red" d="M365 350 C392 330 410 335 435 356"/>
  <text class="note-red" x="360" y="318">si se atasca: pendiente</text>
</svg>
